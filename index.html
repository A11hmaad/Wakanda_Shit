<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Tapestry</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="view active" id="v-landing">
        <div>
            <div class="landing-title" id="book-title-display">The Book</div>
            <div class="landing-subtitle" id="book-author-display"></div>
        </div>
        <div class="landing-divider"></div>
        <div class="landing-actions">
            <button class="btn-primary" id="btn-read">Read</button>
            <div style="width:100%;text-align:center;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);">or</div>
            <div class="pw-row">
                <input type="password" id="pw-input" placeholder="Editor password" />
                <button id="btn-enter">Enter</button>
            </div>
            <div class="error-msg" id="pw-error"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Landing page logic
        async function initLanding() {
            // Get book meta for display
            const snap = await db.ref('meta').get();
            if (snap.exists()) {
                const m = snap.val();
                document.getElementById('book-title-display').textContent = m.title || 'The Tapestry';
                document.getElementById('book-author-display').textContent = m.author || '';
            }
            document.getElementById('btn-read').addEventListener('click', () => {
                window.location.href = 'reader.html';
            });
            document.getElementById('btn-enter').addEventListener('click', () => {
                const pw = document.getElementById('pw-input').value;
                // Load password from Firebase first
                db.ref('meta/password').get().then(snap => {
                    const storedPw = snap.exists() ? snap.val() : 'HambaHamba';
                    if (pw === storedPw) {
                        window.location.href = 'editor.html';
                    } else {
                        document.getElementById('pw-error').textContent = 'Incorrect password.';
                    }
                });
            });
            document.getElementById('pw-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('btn-enter').click();
            });
        }
        initLanding();
    </script>
</body>
</html>
