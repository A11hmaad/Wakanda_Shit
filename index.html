<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Tapestry</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  :root {
    --ink:    #1a1714;
    --paper:  #f7f4ee;
    --muted:  #8c7f70;
    --accent: #5c3d2e;
    --rule:   #ddd5c8;
    --danger: #9b2020;
    --ui-bg:  #eee9e0;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .view { display: none; flex-direction: column; height: 100%; min-height: 0; }
  .view.active { display: flex; }

  /* ... (all other styles unchanged until reader transition) ... */

  /* ── READER SCROLL AREA ── */
  .reader-scroll {
    flex: 1; overflow-y: auto; width: 100%;
    min-height: 0;
    overflow-anchor: none;
    position: relative;
  }

  /* ══════════════════════════════════════
     PURE FLAT SLIDE TRANSITION
     Much softer, slower, purely horizontal slide with gentle fade.
     No page-turn/rotate feel — just elegant flat sliding.
  ══════════════════════════════════════ */
  #reader-area {
    transition: 
      opacity 0.85s cubic-bezier(0.32, 0.04, 0.15, 0.98),
      transform 0.85s cubic-bezier(0.32, 0.04, 0.15, 0.98);
    opacity: 1;
    transform: translateX(0);
    will-change: transform, opacity;
  }

  #reader-area.page-out-left  { opacity: 0; transform: translateX(-120px); }
  #reader-area.page-out-right { opacity: 0; transform: translateX(120px); }
  #reader-area.page-in-left   { opacity: 0; transform: translateX(120px); }
  #reader-area.page-in-right  { opacity: 0; transform: translateX(-120px); }

  @media (prefers-reduced-motion: reduce) {
    #reader-area { transition: opacity 0.25s ease !important; transform: none !important; }
    #reader-area.page-out-left,
    #reader-area.page-out-right,
    #reader-area.page-in-left,
    #reader-area.page-in-right { transform: none !important; }
  }

  /* Rest of your styles remain the same */
  /* ── READER HOMEPAGE ── */
  #reader-homepage {
    max-width: 720px;
    margin: 0 auto;
    padding: 5rem 3rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3rem;
    text-align: center;
    transition: opacity 0.4s ease;
    opacity: 1;
  }
  #reader-homepage.fading { opacity: 0; }

  /* ... (all remaining CSS is unchanged) ... */
</style>
</head>
<body>

<!-- All HTML remains exactly the same as before -->
<!-- (Landing, Editor, Reader, Modals) -->

<div id="v-landing" class="view active"> ... </div>
<div id="v-editor" class="view"> ... </div>
<div id="v-reader" class="view"> ... </div>

<!-- MODALS (unchanged) -->
<!-- ... -->

<script>
/* All JS remains the same except the transition function and comment */

const firebaseConfig = { ... }; // unchanged

/* State and helpers unchanged */

async function bootstrap() { ... } // unchanged

/* ... all functions until the transition ... */

/* ════════════════════════════════════════
   PURE FLAT SLIDE TRANSITION
   Slower (850ms), very soft easing, larger but gentle travel distance
════════════════════════════════════════ */

let _transitionTimer = null;

function runPageTransition(dir, loadNewContent) {
  const area = document.getElementById('reader-area');

  if (_transitionTimer) {
    clearTimeout(_transitionTimer);
    _transitionTimer = null;
  }

  // Reset classes
  area.classList.remove('page-out-left', 'page-out-right', 'page-in-left', 'page-in-right');

  if (dir === 'fade') {
    loadNewContent();
    return;
  }

  const outClass = dir === 'right' ? 'page-out-left' : 'page-out-right';
  const inClass  = dir === 'right' ? 'page-in-right' : 'page-in-left';

  // Trigger reflow
  void area.offsetWidth;
  area.classList.add(outClass);

  _transitionTimer = setTimeout(() => {
    loadNewContent();

    area.classList.remove(outClass);
    area.classList.add(inClass);
    void area.offsetWidth;

    requestAnimationFrame(() => {
      area.classList.remove(inClass);
    });

    _transitionTimer = null;
  }, 520); // tuned to match the longer transition
}

/* Rest of the JavaScript is unchanged */
function renderHomepage() { ... }
function renderChapterLists() { ... }
function selectChapter(key, isEditor, animDir) { ... }
/* ... all other functions ... */

bootstrap();
</script>
</body>
</html>
