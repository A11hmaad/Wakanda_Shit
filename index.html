<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Tapestry</title>

<!-- Google Fonts: Cormorant Garamond (display/body) + Inter (UI) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<!-- Firebase (compat SDK for simplicity in a single HTML file) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  /* ── TOKENS ── */
  :root {
    --ink:      #1a1714;
    --paper:    #f7f4ee;
    --muted:    #8c7f70;
    --accent:   #5c3d2e;
    --rule:     #ddd5c8;
    --danger:   #9b2020;
    --ui-bg:    #eee9e0;

    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'Inter', system-ui, sans-serif;

    /* reader overrides */
    --reader-font: var(--serif);
    --reader-size: 1.2rem;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── VIEWS ── */
  .view { display: none; flex-direction: column; min-height: 100vh; }
  .view.active { display: flex; }

  /* ── LANDING ── */
  #v-landing {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    gap: 3rem;
  }

  .landing-title {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.1;
    color: var(--ink);
  }

  .landing-subtitle {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  .landing-divider {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto;
  }

  .landing-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 340px;
  }

  .btn-primary {
    width: 100%;
    padding: 0.85rem 1.5rem;
    background: var(--accent);
    color: #f7f4ee;
    border: none;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #4a3025; }

  .btn-ghost {
    width: 100%;
    padding: 0.85rem 1.5rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Password input row */
  .pw-row {
    display: flex;
    width: 100%;
    border: 1px solid var(--rule);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pw-row:focus-within { border-color: var(--accent); }
  .pw-row input {
    flex: 1;
    padding: 0.8rem 1rem;
    border: none;
    background: var(--paper);
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
  }
  .pw-row button {
    padding: 0.8rem 1.2rem;
    background: var(--accent);
    border: none;
    color: #f7f4ee;
    font-family: var(--sans);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .pw-row button:hover { background: #4a3025; }

  .error-msg {
    font-size: 0.78rem;
    color: var(--danger);
    font-family: var(--sans);
    min-height: 1rem;
  }

  /* ── SHARED CHROME ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 2rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }

  .app-header h1 {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .header-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

  .btn-sm {
    padding: 0.45rem 0.9rem;
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── HAMBURGER BUTTON ── */
  .hamburger-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem 0.4rem;
    display: flex;
    flex-direction: column;
    gap: 5px;
    justify-content: center;
    align-items: center;
    color: var(--muted);
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .hamburger-btn:hover { color: var(--accent); }
  .hamburger-btn span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: currentColor;
    transition: transform 0.2s, opacity 0.2s;
  }
  .hamburger-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .hamburger-btn.open span:nth-child(2) { opacity: 0; }
  .hamburger-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── DRAWER OVERLAY (backdrop) ── */
  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.35);
    z-index: 40;
  }
  .drawer-backdrop.open { display: block; }

  /* ── SIDEBAR DRAWER ── */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    z-index: 50;
    background: var(--ui-bg);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 1.2rem 1.4rem 0.8rem;
    font-family: var(--sans);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }

  .sidebar-add-btn {
    background: none;
    border: none;
    font-size: 1.2rem;
    color: var(--accent);
    cursor: pointer;
    line-height: 1;
    padding: 0 0.2rem;
  }

  .chapter-list { list-style: none; padding: 0.5rem 0; flex: 1; }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.65rem 1.4rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .chapter-item:hover { background: rgba(92,61,46,0.06); }
  .chapter-item.active { border-left-color: var(--accent); background: rgba(92,61,46,0.08); }

  .chapter-num {
    font-family: var(--serif);
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 1.5rem;
  }
  .chapter-title-text {
    font-family: var(--serif);
    font-size: 0.95rem;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chapter-actions { display: flex; gap: 0.2rem; opacity: 0; transition: opacity 0.15s; }
  .chapter-item:hover .chapter-actions,
  .chapter-item.active .chapter-actions { opacity: 1; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.15rem 0.25rem;
    line-height: 1;
    border-radius: 2px;
    transition: color 0.15s, background 0.15s;
  }
  .icon-btn:hover { color: var(--accent); background: rgba(92,61,46,0.1); }
  .icon-btn.danger:hover { color: var(--danger); background: rgba(155,32,32,0.08); }

  /* Main pane */
  .main-pane {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 3rem 4rem;
    max-width: 860px;
  }

  /* Empty state */
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
  }
  .empty-state p { font-family: var(--serif); font-size: 1.1rem; font-style: italic; }

  /* ── EDITOR ── */
  .editor-chapter-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 300;
    border: none;
    background: transparent;
    outline: none;
    color: var(--ink);
    width: 100%;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.5rem;
  }

  .editor-toolbar {
    display: flex;
    gap: 0.3rem;
    padding: 0.5rem 0;
    margin-bottom: 0.8rem;
    border-bottom: 1px solid var(--rule);
  }

  .toolbar-btn {
    background: none;
    border: 1px solid transparent;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    border-radius: 2px;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .toolbar-btn:hover { border-color: var(--rule); color: var(--accent); }
  .toolbar-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(92,61,46,0.06); }

  #editor-content {
    flex: 1;
    min-height: 400px;
    font-family: var(--serif);
    font-size: 1.1rem;
    line-height: 1.85;
    color: var(--ink);
    outline: none;
    caret-color: var(--accent);
  }
  #editor-content:empty::before {
    content: 'Begin writing…';
    color: var(--rule);
    font-style: italic;
  }

  .editor-save-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding-top: 1.5rem;
    margin-top: 1.5rem;
    border-top: 1px solid var(--rule);
  }

  .save-status {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--sans);
    flex: 1;
  }

  /* ── READER ── */
  .reader-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1.4rem;
    background: var(--ui-bg);
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }

  .reader-controls label {
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .reader-controls select,
  .reader-controls input[type=range] {
    font-family: var(--sans);
    font-size: 0.82rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    padding: 0.25rem 0.5rem;
    outline: none;
    cursor: pointer;
  }

  .reader-content-wrap { padding: 3rem 4rem; max-width: 860px; }

  .reader-chapter-heading {
    font-family: var(--reader-font);
    font-size: calc(var(--reader-size) * 1.8);
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
  }

  #reader-body {
    font-family: var(--reader-font);
    font-size: var(--reader-size);
    line-height: 1.9;
    color: var(--ink);
  }
  #reader-body b, #reader-body strong { font-weight: 600; }
  #reader-body i, #reader-body em { font-style: italic; }
  #reader-body u { text-decoration: underline; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 2rem;
    width: 90%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .modal h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 1.4rem;
  }

  .modal label {
    font-size: 0.72rem;
    font-family: var(--sans);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .modal input[type=text],
  .modal input[type=password],
  .modal input[type=number] {
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 0.6rem;
    justify-content: flex-end;
    margin-top: 0.5rem;
  }

  .btn-accent {
    padding: 0.6rem 1.3rem;
    background: var(--accent);
    color: #f7f4ee;
    border: none;
    font-family: var(--sans);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-accent:hover { background: #4a3025; }

  .btn-cancel {
    padding: 0.6rem 1.3rem;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    font-family: var(--sans);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-cancel:hover { border-color: var(--muted); }

  /* ── MISC ── */
  .serial-controls { display: flex; gap: 0.2rem; flex-direction: column; }

  @media (max-width: 640px) {
    .main-pane, .reader-content-wrap { padding: 2rem 1.2rem; }
    .app-header { padding: 0.9rem 1rem; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     VIEW: LANDING
═══════════════════════════════════════ -->
<div id="v-landing" class="view active">
  <div>
    <div class="landing-title" id="book-title-display">The Book</div>
    <div class="landing-subtitle" id="book-author-display"></div>
  </div>

  <div class="landing-divider"></div>

  <div class="landing-actions">
    <button class="btn-primary" onclick="enterReader()">Read</button>

    <div style="width:100%; text-align:center; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted);">or</div>

    <div class="pw-row">
      <input type="password" id="pw-input" placeholder="Editor password" onkeydown="if(event.key==='Enter')tryLogin()" />
      <button onclick="tryLogin()">Enter</button>
    </div>
    <div class="error-msg" id="pw-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     VIEW: EDITOR
═══════════════════════════════════════ -->
<div id="v-editor" class="view">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:0.8rem;">
      <button class="hamburger-btn" id="editor-hamburger" onclick="toggleDrawer('editor')" title="Chapters" aria-label="Toggle chapters">
        <span></span><span></span><span></span>
      </button>
      <h1 id="editor-book-title">The Book</h1>
    </div>
    <div class="header-actions">
      <button class="btn-sm" onclick="openChangePassword()">Change password</button>
      <button class="btn-sm" onclick="openBookSettings()">Book title</button>
      <button class="btn-sm danger" onclick="exitToLanding()">Exit</button>
    </div>
  </div>

  <!-- Drawer backdrop -->
  <div class="drawer-backdrop" id="editor-backdrop" onclick="closeDrawer('editor')"></div>

  <div class="app-body">
    <!-- Sidebar drawer -->
    <nav class="sidebar" id="editor-sidebar">
      <div class="sidebar-header">
        Chapters
        <button class="sidebar-add-btn" title="Add chapter" onclick="openAddChapter()">＋</button>
      </div>
      <ul class="chapter-list" id="editor-chapter-list"></ul>
    </nav>

    <!-- Main editing area -->
    <div class="main-pane" id="editor-main">
      <div class="empty-state" id="editor-empty">
        <p>Select a chapter to begin, or add one.</p>
      </div>

      <div id="editor-area" style="display:none; display:flex; flex-direction:column; flex:1;">
        <input type="text" class="editor-chapter-title" id="editor-title-input" placeholder="Chapter title" />

        <div class="editor-toolbar">
          <button class="toolbar-btn" id="tb-bold"      onmousedown="e(event,'bold')"     title="Bold (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" id="tb-italic"    onmousedown="e(event,'italic')"   title="Italic (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" id="tb-underline" onmousedown="e(event,'underline')" title="Underline (Ctrl+U)"><u>U</u></button>
        </div>

        <div id="editor-content" contenteditable="true"
             onkeydown="handleEditorKey(event)"
             onmouseup="updateToolbar()" onkeyup="updateToolbar()"
             onselectionchange="updateToolbar()"></div>

        <div class="editor-save-bar">
          <div class="save-status" id="save-status">Unsaved changes</div>
          <button class="btn-accent" onclick="saveCurrentChapter()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     VIEW: READER
═══════════════════════════════════════ -->
<div id="v-reader" class="view">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:0.8rem;">
      <button class="hamburger-btn" id="reader-hamburger" onclick="toggleDrawer('reader')" title="Chapters" aria-label="Toggle chapters">
        <span></span><span></span><span></span>
      </button>
      <h1 id="reader-book-title">The Book</h1>
    </div>
    <div class="header-actions">
      <button class="btn-sm" onclick="exitToLanding()">← Back</button>
    </div>
  </div>

  <!-- Font/size controls -->
  <div class="reader-controls">
    <label>Font
      <select id="reader-font-select" onchange="applyReaderFont()">
        <option value="'Cormorant Garamond', Georgia, serif">Cormorant (default)</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Palatino Linotype', Palatino, serif">Palatino</option>
        <option value="'Inter', system-ui, sans-serif">Inter (sans)</option>
        <option value="'Courier New', monospace">Courier (mono)</option>
      </select>
    </label>
    <label>Size
      <input type="range" id="reader-size-range" min="12" max="28" value="19" oninput="applyReaderSize()" />
      <span id="reader-size-label" style="font-family:var(--sans);font-size:0.8rem;color:var(--muted)">19px</span>
    </label>
  </div>

  <!-- Drawer backdrop -->
  <div class="drawer-backdrop" id="reader-backdrop" onclick="closeDrawer('reader')"></div>

  <div class="app-body">
    <!-- Sidebar drawer -->
    <nav class="sidebar" id="reader-sidebar">
      <div class="sidebar-header">Chapters</div>
      <ul class="chapter-list" id="reader-chapter-list"></ul>
    </nav>

    <!-- Reading area -->
    <div style="flex:1; overflow-y:auto; width:100%;">
      <div class="reader-content-wrap">
        <div class="empty-state" id="reader-empty">
          <p>Welcome to the Tapestry</p>
        </div>
        <div id="reader-area" style="display:none;">
          <h2 class="reader-chapter-heading" id="reader-chapter-title"></h2>
          <div id="reader-body"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODALS
═══════════════════════════════════════ -->

<!-- Add chapter -->
<div class="modal-overlay" id="modal-add-chapter">
  <div class="modal">
    <h2>New chapter</h2>
    <label>Title
      <input type="text" id="new-chapter-title" placeholder="Chapter title" />
    </label>
    <label>Serial (order)
      <input type="number" id="new-chapter-serial" min="1" value="1" />
    </label>
    <div class="error-msg" id="add-chapter-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-add-chapter')">Cancel</button>
      <button class="btn-accent" onclick="addChapter()">Add</button>
    </div>
  </div>
</div>

<!-- Edit chapter meta -->
<div class="modal-overlay" id="modal-edit-chapter">
  <div class="modal">
    <h2>Edit chapter</h2>
    <input type="hidden" id="edit-chapter-key" />
    <label>Title
      <input type="text" id="edit-chapter-title" />
    </label>
    <label>Serial (order)
      <input type="number" id="edit-chapter-serial" min="1" />
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-edit-chapter')">Cancel</button>
      <button class="btn-accent" onclick="saveChapterMeta()">Save</button>
    </div>
  </div>
</div>

<!-- Change password -->
<div class="modal-overlay" id="modal-change-pw">
  <div class="modal">
    <h2>Change password</h2>
    <label>Current password
      <input type="password" id="old-pw" />
    </label>
    <label>New password
      <input type="password" id="new-pw" />
    </label>
    <label>Confirm new password
      <input type="password" id="new-pw2" />
    </label>
    <div class="error-msg" id="pw-change-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-change-pw')">Cancel</button>
      <button class="btn-accent" onclick="changePassword()">Update</button>
    </div>
  </div>
</div>

<!-- Book settings -->
<div class="modal-overlay" id="modal-book-settings">
  <div class="modal">
    <h2>Book settings</h2>
    <label>Title
      <input type="text" id="bs-title" placeholder="My Novel" />
    </label>
    <label>Author / subtitle
      <input type="text" id="bs-author" placeholder="by Author Name" />
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-book-settings')">Cancel</button>
      <button class="btn-accent" onclick="saveBookSettings()">Save</button>
    </div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════ -->
<script>
/* ── Firebase init ── */
const firebaseConfig = {
  apiKey: "AIzaSyAwktvktXaaRxFPX500kOBcvuUtOjRjz6M",
  authDomain: "wakanda-shit.firebaseapp.com",
  databaseURL: "https://wakanda-shit-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wakanda-shit",
  storageBucket: "wakanda-shit.firebasestorage.app",
  messagingSenderId: "491323769717",
  appId: "1:491323769717:web:825b6044e43e672404493c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ── State ── */
let chapters = {};       // key -> { title, serial, content }
let currentKey = null;
let editorMode = false;
let storedPassword = "HambaHamba";
let bookMeta = { title: "The Book", author: "" };

/* ── Bootstrap: load meta + password from Firebase ── */
async function bootstrap() {
  const metaSnap = await db.ref('meta').get();
  if (metaSnap.exists()) {
    const m = metaSnap.val();
    if (m.title)    bookMeta.title  = m.title;
    if (m.author)   bookMeta.author = m.author;
    if (m.password) storedPassword  = m.password;
  }
  applyBookMeta();

  db.ref('chapters').on('value', snap => {
    chapters = snap.val() || {};
    renderChapterLists();
  });
}

function applyBookMeta() {
  document.getElementById('book-title-display').textContent  = bookMeta.title;
  document.getElementById('book-author-display').textContent = bookMeta.author;
  document.getElementById('editor-book-title').textContent   = bookMeta.title;
  document.getElementById('reader-book-title').textContent   = bookMeta.title;
}

/* ── Views ── */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function exitToLanding() {
  editorMode = false;
  currentKey = null;
  closeDrawer('editor');
  closeDrawer('reader');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  showView('v-landing');
}

function enterReader() {
  editorMode = false;
  currentKey = null;
  showView('v-reader');
  renderChapterLists();
  // auto-select first chapter
  const sorted = sortedChapters();
  if (sorted.length) selectChapter(sorted[0].key, false);
}

function tryLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === storedPassword) {
    document.getElementById('pw-error').textContent = '';
    editorMode = true;
    showView('v-editor');
    renderChapterLists();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password.';
  }
}

/* ── Chapters: sorted helper ── */
function sortedChapters() {
  return Object.entries(chapters)
    .map(([key, val]) => ({ key, ...val }))
    .sort((a, b) => (a.serial || 0) - (b.serial || 0));
}

/* ── Render sidebar lists ── */
function renderChapterLists() {
  const sorted = sortedChapters();

  // Editor list
  const el = document.getElementById('editor-chapter-list');
  el.innerHTML = '';
  sorted.forEach(ch => {
    const li = document.createElement('li');
    li.className = 'chapter-item' + (ch.key === currentKey ? ' active' : '');
    li.innerHTML = `
      <span class="chapter-num">${ch.serial || ''}</span>
      <span class="chapter-title-text">${escHtml(ch.title || 'Untitled')}</span>
      <span class="chapter-actions">
        <button class="icon-btn" onclick="openEditChapter('${ch.key}')" title="Edit">✎</button>
        <button class="icon-btn danger" onclick="deleteChapter('${ch.key}')" title="Delete">✕</button>
      </span>`;
    li.addEventListener('click', evt => {
      if (evt.target.closest('.chapter-actions')) return;
      selectChapter(ch.key, true);
      closeDrawer('editor');
    });
    el.appendChild(li);
  });

  // Reader list
  const rl = document.getElementById('reader-chapter-list');
  rl.innerHTML = '';
  if (!sorted.length) {
    document.getElementById('reader-empty').style.display = '';
    document.getElementById('reader-area').style.display  = 'none';
  }
  sorted.forEach(ch => {
    const li = document.createElement('li');
    li.className = 'chapter-item' + (ch.key === currentKey ? ' active' : '');
    li.innerHTML = `
      <span class="chapter-num">${ch.serial || ''}</span>
      <span class="chapter-title-text">${escHtml(ch.title || 'Untitled')}</span>`;
    li.addEventListener('click', () => {
      selectChapter(ch.key, false);
      closeDrawer('reader');
    });
    rl.appendChild(li);
  });
}

/* ── Select a chapter ── */
function selectChapter(key, isEditor) {
  currentKey = key;
  const ch = chapters[key];
  if (!ch) return;

  if (isEditor) {
    // Show editor area
    document.getElementById('editor-empty').style.display = 'none';
    const area = document.getElementById('editor-area');
    area.style.display = 'flex';
    document.getElementById('editor-title-input').value = ch.title || '';
    document.getElementById('editor-content').innerHTML = ch.content || '';
    document.getElementById('save-status').textContent = 'Saved';
  } else {
    // Show reader area
    document.getElementById('reader-empty').style.display = 'none';
    const area = document.getElementById('reader-area');
    area.style.display = '';
    document.getElementById('reader-chapter-title').textContent = ch.title || 'Untitled';
    document.getElementById('reader-body').innerHTML = ch.content || '<em style="color:var(--muted)">This chapter has no content yet.</em>';
    // Re-apply current font/size preferences over any baked-in inline styles
    applyReaderFont();
    applyReaderSize();
  }

  renderChapterLists(); // re-highlight active
}

/* ── Editor: formatting ── */
function e(evt, cmd) {
  evt.preventDefault();
  document.execCommand(cmd, false, null);
  updateToolbar();
}

function handleEditorKey(evt) {
  // Mark unsaved on typing
  document.getElementById('save-status').textContent = 'Unsaved changes';
  updateToolbar();
}

function updateToolbar() {
  ['bold','italic','underline'].forEach(cmd => {
    const active = document.queryCommandState(cmd);
    document.getElementById('tb-' + cmd).classList.toggle('active', active);
  });
}

/* ── Save chapter ── */
async function saveCurrentChapter() {
  if (!currentKey) return;
  const title   = document.getElementById('editor-title-input').value.trim() || 'Untitled';
  const content = document.getElementById('editor-content').innerHTML;
  await db.ref('chapters/' + currentKey).update({ title, content });
  document.getElementById('save-status').textContent = 'Saved ✓';
}

/* ── Add chapter ── */
function openAddChapter() {
  const sorted = sortedChapters();
  document.getElementById('new-chapter-serial').value = sorted.length + 1;
  document.getElementById('new-chapter-title').value  = '';
  document.getElementById('add-chapter-error').textContent = '';
  openModal('modal-add-chapter');
}

async function addChapter() {
  const title  = document.getElementById('new-chapter-title').value.trim();
  const serial = parseInt(document.getElementById('new-chapter-serial').value) || 1;
  if (!title) { document.getElementById('add-chapter-error').textContent = 'Title required.'; return; }
  const ref = db.ref('chapters').push();
  await ref.set({ title, serial, content: '' });
  closeModal('modal-add-chapter');
  selectChapter(ref.key, true);
}

/* ── Edit chapter meta ── */
function openEditChapter(key) {
  const ch = chapters[key];
  if (!ch) return;
  document.getElementById('edit-chapter-key').value   = key;
  document.getElementById('edit-chapter-title').value  = ch.title  || '';
  document.getElementById('edit-chapter-serial').value = ch.serial || 1;
  openModal('modal-edit-chapter');
}

async function saveChapterMeta() {
  const key    = document.getElementById('edit-chapter-key').value;
  const title  = document.getElementById('edit-chapter-title').value.trim() || 'Untitled';
  const serial = parseInt(document.getElementById('edit-chapter-serial').value) || 1;
  await db.ref('chapters/' + key).update({ title, serial });
  // If this is the open chapter, refresh the title input
  if (key === currentKey) document.getElementById('editor-title-input').value = title;
  closeModal('modal-edit-chapter');
}

/* ── Delete chapter ── */
async function deleteChapter(key) {
  if (!confirm('Delete this chapter? This cannot be undone.')) return;
  await db.ref('chapters/' + key).remove();
  if (currentKey === key) {
    currentKey = null;
    document.getElementById('editor-empty').style.display = '';
    document.getElementById('editor-area').style.display  = 'none';
  }
}

/* ── Change password ── */
function openChangePassword() {
  document.getElementById('old-pw').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('new-pw2').value = '';
  document.getElementById('pw-change-error').textContent = '';
  openModal('modal-change-pw');
}

async function changePassword() {
  const old  = document.getElementById('old-pw').value;
  const n1   = document.getElementById('new-pw').value;
  const n2   = document.getElementById('new-pw2').value;
  const err  = document.getElementById('pw-change-error');
  if (old !== storedPassword) { err.textContent = 'Current password incorrect.'; return; }
  if (!n1)                    { err.textContent = 'New password cannot be empty.'; return; }
  if (n1 !== n2)              { err.textContent = 'Passwords do not match.'; return; }
  storedPassword = n1;
  await db.ref('meta/password').set(n1);
  closeModal('modal-change-pw');
}

/* ── Book settings ── */
function openBookSettings() {
  document.getElementById('bs-title').value  = bookMeta.title;
  document.getElementById('bs-author').value = bookMeta.author;
  openModal('modal-book-settings');
}

async function saveBookSettings() {
  bookMeta.title  = document.getElementById('bs-title').value.trim()  || 'The Book';
  bookMeta.author = document.getElementById('bs-author').value.trim();
  await db.ref('meta').update({ title: bookMeta.title, author: bookMeta.author });
  applyBookMeta();
  closeModal('modal-book-settings');
}

/* ── Reader controls ── */
function applyReaderFont() {
  const f = document.getElementById('reader-font-select').value;
  const body = document.getElementById('reader-body');
  const title = document.getElementById('reader-chapter-title');
  body.style.fontFamily = f;
  title.style.fontFamily = f;
  // Override any inline font-family on child elements saved by the editor
  body.querySelectorAll('*').forEach(el => { el.style.fontFamily = f; });
}

function applyReaderSize() {
  const s = parseInt(document.getElementById('reader-size-range').value);
  const body = document.getElementById('reader-body');
  body.style.fontSize = s + 'px';
  document.getElementById('reader-chapter-title').style.fontSize = (s * 1.8) + 'px';
  document.getElementById('reader-size-label').textContent = s + 'px';
  // Override any inline font-size on child elements saved by the editor
  body.querySelectorAll('*').forEach(el => { el.style.fontSize = s + 'px'; });
}

/* ── Drawer (hamburger sidebar) ── */
function toggleDrawer(which) {
  const sidebar  = document.getElementById(which + '-sidebar');
  const backdrop = document.getElementById(which + '-backdrop');
  const btn      = document.getElementById(which + '-hamburger');
  const isOpen   = sidebar.classList.contains('open');
  if (isOpen) {
    closeDrawer(which);
  } else {
    sidebar.classList.add('open');
    backdrop.classList.add('open');
    btn.classList.add('open');
  }
}

function closeDrawer(which) {
  const sidebar  = document.getElementById(which + '-sidebar');
  const backdrop = document.getElementById(which + '-backdrop');
  const btn      = document.getElementById(which + '-hamburger');
  if (sidebar)  sidebar.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
  if (btn)      btn.classList.remove('open');
}

/* ── Modal helpers ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', evt => { if (evt.target === el) closeModal(el.id); });
});

/* ── Escape html ── */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Start ── */
bootstrap();
</script>
</body>
</html>
