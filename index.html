<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Digital Book</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwktvktXaaRxFPX500kOBcvuUtOjRjz6M",
            authDomain: "wakanda-shit.firebaseapp.com",
            projectId: "wakanda-shit",
            storageBucket: "wakanda-shit.firebasestorage.app",
            messagingSenderId: "491323769717",
            appId: "1:491323769717:web:825b6044e43e672404493c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
    </script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .hidden { display: none; }
        .section { border: 1px solid #ccc; padding: 15px; margin-top: 10px; }
        #edit-area { width: 100%; min-height: 200px; border: 1px solid #999; padding: 10px; background-color: #fff; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Select Role</h2>
        <button onclick="login('viewer')">Enter as Viewer</button>
        <hr>
        <input type="password" id="passInput" placeholder="Editor Password">
        <button onclick="login('editor')">Enter as Editor</button>
    </div>

    <div id="app-screen" class="hidden">
        <h2 id="role-title">Digital Book</h2>
        <button onclick="location.reload()">Logout</button>
        
        <div id="editor-controls" class="hidden">
            <button onclick="addChapter()">+ Add Chapter</button>
            <button onclick="changePassword()">Change Password</button>
        </div>
        
        <h3>Chapters</h3>
        <ul id="chapter-list"></ul>
        
        <div id="content-view" class="section hidden">
            <h2 id="chapter-title"></h2>
            <div id="text-display"></div>
            <div id="editor-tools" class="hidden">
                <hr>
                <div id="edit-area" contenteditable="true"></div>
                <button onclick="saveContent()">Save Changes</button>
                <button onclick="deleteChapter()" style="color: red;">Delete Chapter</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let bookData = { password: "HambaHamba", chapters: [] };

        async function login(role) {
            const docRef = window.doc(window.db, "book", "data");
            const docSnap = await window.getDoc(docRef);
            
            if (docSnap.exists()) {
                bookData = docSnap.data();
            } else {
                await window.setDoc(docRef, bookData);
            }

            if (role === 'editor') {
                const pass = document.getElementById('passInput').value;
                if (pass !== bookData.password) { alert("Wrong Password!"); return; }
                document.getElementById('editor-controls').classList.remove('hidden');
            }
            
            currentUser = role;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            renderChapters();
        }

        async function changePassword() {
            const newPass = prompt("Enter new Editor password:");
            if (newPass) {
                bookData.password = newPass;
                await window.setDoc(window.doc(window.db, "book", "data"), bookData);
                alert("Password updated successfully!");
            }
        }

        function renderChapters() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = ""; // Clear existing list
            bookData.chapters.forEach((ch, idx) => {
                const li = document.createElement('li');
                // Use a proper link to trigger the view function
                li.innerHTML = `<a href="#" onclick="viewChapter(${idx}); return false;">${ch.title}</a>`;
                list.appendChild(li); // Fixed: This now appends to the 'list' element
            });
        }

        function viewChapter(idx) {
            window.currentIdx = idx;
            const ch = bookData.chapters[idx];
            document.getElementById('content-view').classList.remove('hidden');
            document.getElementById('chapter-title').innerText = ch.title;
            document.getElementById('text-display').innerHTML = ch.content;
            
            if (currentUser === 'editor') {
                document.getElementById('editor-tools').classList.remove('hidden');
                document.getElementById('edit-area').innerHTML = ch.content;
            }
        }

        async function saveContent() {
            bookData.chapters[window.currentIdx].content = document.getElementById('edit-area').innerHTML;
            await window.setDoc(window.doc(window.db, "book", "data"), bookData);
            alert("Saved to Cloud!");
            location.reload(); 
        }

        async function addChapter() {
            const title = prompt("Chapter Name:");
            if (title) {
                bookData.chapters.push({ title, content: "New chapter content..." });
                await window.setDoc(window.doc(window.db, "book", "data"), bookData);
                renderChapters();
            }
        }

        async function deleteChapter() {
            if (confirm("Delete this chapter?")) {
                bookData.chapters.splice(window.currentIdx, 1);
                await window.setDoc(window.doc(window.db, "book", "data"), bookData);
                location.reload();
            }
        }
    </script>
</body>
</html>
