<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Tapestry – Notes</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="view active" style="display:flex; flex-direction:column; height:100%;">
        <div class="app-header">
            <div style="display:flex;align-items:center;gap:0.8rem;">
                <h1>Notes</h1>
            </div>
            <div class="header-actions">
                <a href="editor.html" class="btn-sm">← Back to Editor</a>
            </div>
        </div>
        <div class="app-body">
            <div class="notes-sidebar" id="notes-sidebar">
                <div class="notes-sidebar-header">Categories<button class="sidebar-add-btn" id="notes-sidebar-add">＋</button></div>
                <ul class="notes-nav-list" id="notes-nav-list"></ul>
            </div>
            <div class="notes-editor-area" id="notes-editor-area">
                <div class="empty-state" id="notes-empty"><p>Loading notes…</p></div>
                <div class="notes-browser" id="notes-browser" style="display:none;">
                    <div class="notes-browser-header">
                        <div style="display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;">
                            <button class="btn-back" id="notes-browser-back-btn">← Back</button>
                            <h3 id="notes-browser-title">Items</h3>
                        </div>
                        <button class="btn-accent" id="notes-browser-add-btn">＋ Add</button>
                    </div>
                    <div id="notes-browser-content"></div>
                </div>
                <div id="notes-editor-content" style="display:none;flex-direction:column;flex:1;">
                    <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem;flex-wrap:wrap;">
                        <button class="btn-back" id="notes-editor-back-btn">← Back</button>
                    </div>
                    <input type="text" class="notes-editor-title" id="notes-editor-title" placeholder="Note title" />
                    <div class="editor-toolbar">
                        <button class="toolbar-btn" id="notes-tb-bold"><b>B</b></button>
                        <button class="toolbar-btn" id="notes-tb-italic"><i>I</i></button>
                        <button class="toolbar-btn" id="notes-tb-underline"><u>U</u></button>
                    </div>
                    <div id="notes-editor-body" contenteditable="true" class="notes-editor-body"></div>
                    <div class="editor-save-bar">
                        <div class="save-status" id="notes-save-status">Unsaved changes</div>
                        <button class="btn-accent" id="notes-save-btn">Save Note</button>
                    </div>
                </div>
                <div id="notes-pc-list" style="display:none;flex-direction:column;flex:1;">
                    <div class="notes-browser-header">
                        <div style="display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;">
                            <button class="btn-back" id="notes-pc-back-btn">← Back</button>
                            <h3 id="notes-pc-list-title">Potential Chapters</h3>
                        </div>
                        <button class="btn-accent" id="notes-pc-add-btn">＋ Add Chapter</button>
                    </div>
                    <div id="notes-pc-list-content"></div>
                </div>
                <div id="notes-timeline-view" style="display:none;flex-direction:column;flex:1;">
                    <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;flex-wrap:wrap;">
                        <button class="btn-back" id="notes-timeline-back-btn">← Back</button>
                    </div>
                    <div class="timeline-era-setup">
                        <label>Positive suffix <input type="text" id="timeline-era-positive" placeholder="e.g. AD" /></label>
                        <label>Negative suffix <input type="text" id="timeline-era-negative" placeholder="e.g. BC" /></label>
                        <button class="btn-accent" id="timeline-era-save-btn">Save Era</button>
                    </div>
                    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap;">
                        <input type="number" id="timeline-new-year" placeholder="Year" style="width:80px;padding:0.4rem 0.6rem;border:1px solid var(--rule);background:var(--paper);font-family:var(--sans);font-size:0.85rem;outline:none;min-width:60px;" />
                        <input type="text" id="timeline-new-text" placeholder="Event description" style="flex:1;min-width:140px;padding:0.4rem 0.6rem;border:1px solid var(--rule);background:var(--paper);font-family:var(--serif);font-size:0.9rem;outline:none;" />
                        <button class="btn-accent" id="timeline-entry-add-btn">Add</button>
                    </div>
                    <div class="timeline-entries" id="timeline-entries"></div>
                    <div class="editor-save-bar">
                        <div class="save-status" id="timeline-save-status"></div>
                        <button class="btn-accent" id="timeline-entries-save-btn">Save Timeline</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="modal-add-item">
        <div class="modal">
            <h2 id="modal-add-item-title">Add Item</h2>
            <label>Name <input type="text" id="new-item-name" placeholder="Name" /></label>
            <div class="error-msg" id="add-item-error"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-add-item-cancel">Cancel</button>
                <button class="btn-accent" id="modal-add-item-btn">Add</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-add-potential-chapter">
        <div class="modal">
            <h2>Add Potential Chapter</h2>
            <label>Title <input type="text" id="new-pc-title" placeholder="Chapter title" /></label>
            <label>Serial (order) <input type="number" id="new-pc-serial" min="1" value="1" /></label>
            <div class="error-msg" id="add-pc-error"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-add-pc-cancel">Cancel</button>
                <button class="btn-accent" id="modal-add-pc-btn">Add</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modal-edit-potential-chapter">
        <div class="modal">
            <h2>Edit Potential Chapter</h2>
            <input type="hidden" id="edit-pc-key" />
            <label>Title <input type="text" id="edit-pc-title" /></label>
            <label>Serial (order) <input type="number" id="edit-pc-serial" min="1" /></label>
            <div class="modal-actions">
                <button class="btn-cancel" id="modal-edit-pc-cancel">Cancel</button>
                <button class="btn-accent" id="modal-edit-pc-save-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        // ===== FIREBASE INIT =====
        const firebaseConfig = {
            apiKey: "AIzaSyAwktvktXaaRxFPX500kOBcvuUtOjRjz6M",
            authDomain: "wakanda-shit.firebaseapp.com",
            databaseURL: "https://wakanda-shit-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wakanda-shit",
            storageBucket: "wakanda-shit.firebasestorage.app",
            messagingSenderId: "491323769717",
            appId: "1:491323769717:web:825b6044e43e672404493c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== UTILITIES =====
        function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function wordCount(h) { const t=(h||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); return t?t.split(' ').filter(w=>w.length>0).length:0; }
        function readingMins(h) { return Math.max(1,Math.ceil(wordCount(h)/200)); }
        function clampPct(v) { return Math.max(0,Math.min(100,Math.round(v))); }
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        // ===== STATE =====
        let notesData = { characters:{}, potentialScenes:{}, nations:{}, religions:{}, worldbuilding:{}, overallStory:{content:''}, timeline:{positiveSuffix:'AD',negativeSuffix:'BC',entries:[]} };
        let notesCurrentCategory = null;
        let notesCurrentCharId = null;
        let notesCurrentPsCharId = null;
        let notesCurrentChId = null;
        let notesCurrentNationId = null;
        let notesCurrentReligionId = null;
        let notesCurrentWbId = null;
        let notesUnsavedFlag = false;
        let timelineUnsavedFlag = false;
        let notesAddMode = null;
        let _pendingPsCharAdd = false;

        // ===== HELPERS =====
        function hideAllNotesViews() {
            ['notes-empty','notes-browser','notes-editor-content','notes-pc-list','notes-timeline-view'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        }

        function renderNotesNav() {
            const nav = document.getElementById('notes-nav-list');
            if (!nav) return;
            const ps = Object.keys(notesData.potentialScenes||{}).length;
            const ch = Object.keys(notesData.characters||{}).length;
            const na = Object.keys(notesData.nations||{}).length;
            const re = Object.keys(notesData.religions||{}).length;
            const wb = Object.keys(notesData.worldbuilding||{}).length;
            nav.innerHTML = `
                <li class="notes-nav-category${notesCurrentCategory==='potentialScenes'?' active':''}" data-cat="potentialScenes"><span class="cat-icon">🎬</span> Potential Scenes <span style="margin-left:auto;font-size:0.7rem;color:var(--muted);">${ps}</span></li>
                <li class="notes-nav-category${notesCurrentCategory==='characters'?' active':''}" data-cat="characters"><span class="cat-icon">👤</span> Characters <span style="margin-left:auto;font-size:0.7rem;color:var(--muted);">${ch}</span></li>
                <li class="notes-nav-category${notesCurrentCategory==='nations'?' active':''}" data-cat="nations"><span class="cat-icon">🏴</span> Nations <span style="margin-left:auto;font-size:0.7rem;color:var(--muted);">${na}</span></li>
                <li class="notes-nav-category${notesCurrentCategory==='religions'?' active':''}" data-cat="religions"><span class="cat-icon">☀️</span> Religions <span style="margin-left:auto;font-size:0.7rem;color:var(--muted);">${re}</span></li>
                <li class="notes-nav-category${notesCurrentCategory==='worldbuilding'?' active':''}" data-cat="worldbuilding"><span class="cat-icon">📜</span> Worldbuilding <span style="margin-left:auto;font-size:0.7rem;color:var(--muted);">${wb}</span></li>
                <li class="notes-nav-category${notesCurrentCategory==='overallStory'?' active':''}" data-cat="overallStory"><span class="cat-icon">📖</span> Overall Story</li>
                <li class="notes-nav-category${notesCurrentCategory==='timeline'?' active':''}" data-cat="timeline"><span class="cat-icon">⏳</span> Sort Timeline</li>`;
            if (notesCurrentCategory === 'potentialScenes') {
                const sub = document.createElement('ul');
                sub.className = 'notes-sub-list';
                Object.entries(notesData.potentialScenes||{}).forEach(([id,d]) => {
                    const li = document.createElement('li');
                    li.className = 'notes-sub-item' + (notesCurrentPsCharId===id?' active':'');
                    li.innerHTML = `<span data-psid="${id}" class="ps-char-name">${escHtml(d.name||'Unnamed')}</span><span class="sub-actions"><button class="icon-btn danger ps-del-btn" data-psid="${id}">✕</button></span>`;
                    sub.appendChild(li);
                });
                nav.appendChild(sub);
            }
        }

        function selectNotesCategory(cat) {
            if (notesUnsavedFlag && notesCurrentCategory && notesCurrentCategory!=='timeline') saveCurrentNoteSilent();
            if (timelineUnsavedFlag && notesCurrentCategory==='timeline') saveTimelineEntriesSilent();
            notesCurrentCategory=cat; notesCurrentCharId=null; notesCurrentPsCharId=null; notesCurrentChId=null;
            notesCurrentNationId=null; notesCurrentReligionId=null; notesCurrentWbId=null;
            notesUnsavedFlag=false; timelineUnsavedFlag=false;
            hideAllNotesViews();
            if (cat==='potentialScenes') showNotesBrowser('Potential Scenes','potentialScenes',notesData.potentialScenes||{});
            else if (cat==='characters') showNotesBrowser('Characters','characters',notesData.characters||{});
            else if (cat==='nations') showNotesBrowser('Nations','nations',notesData.nations||{});
            else if (cat==='religions') showNotesBrowser('Religions','religions',notesData.religions||{});
            else if (cat==='worldbuilding') showNotesBrowser('Worldbuilding','worldbuilding',notesData.worldbuilding||{});
            else if (cat==='overallStory') loadOverallStoryEditor();
            else if (cat==='timeline') loadTimelineView();
            renderNotesNav();
        }

        function showNotesBrowser(title, dataKey, dataObj) {
            hideAllNotesViews();
            document.getElementById('notes-browser').style.display='flex';
            document.getElementById('notes-browser-title').textContent=title;
            notesAddMode=dataKey;
            const entries=Object.entries(dataObj||{});
            const c=document.getElementById('notes-browser-content');
            c.innerHTML=entries.length
                ?`<div class="notes-card-grid">${entries.map(([id,d])=>`<div class="notes-card" data-key="${dataKey}" data-id="${id}"><span class="notes-card-name">${escHtml(d.name||'Unnamed')}</span><span class="notes-card-actions"><button class="icon-btn danger card-del-btn" data-key="${dataKey}" data-id="${id}">✕</button></span></div>`).join('')}</div>`
                :`<p style="color:var(--muted);font-style:italic;text-align:center;padding:2rem;">No items yet. Click "+ Add" to create one.</p>`;
        }

        function handleNotesBrowserAdd() {
            if (notesAddMode==='potentialScenes') openAddPotentialScenesCharacter();
            else openAddItem(notesAddMode, 'Add ' + notesAddMode.charAt(0).toUpperCase()+notesAddMode.slice(1).replace('potentialScenes','Character'));
        }

        function openAddItem(mode, title) {
            notesAddMode=mode; _pendingPsCharAdd=false;
            document.getElementById('modal-add-item-title').textContent=title;
            document.getElementById('new-item-name').value='';
            document.getElementById('add-item-error').textContent='';
            openModal('modal-add-item');
        }

        async function addNotesItem() {
            const name=document.getElementById('new-item-name').value.trim();
            if (!name) { document.getElementById('add-item-error').textContent='Name required.'; return; }
            const mode=notesAddMode; closeModal('modal-add-item');
            if (mode==='characters') {
                const id=db.ref('notes/characters').push().key;
                notesData.characters[id]={name,content:''};
                await db.ref('notes/characters/'+id).set({name,content:''});
                notesCurrentCharId=id; loadProfileEditor('characters',id);
            } else if (mode==='nations') {
                const id=db.ref('notes/nations').push().key;
                notesData.nations[id]={name,content:''};
                await db.ref('notes/nations/'+id).set({name,content:''});
                notesCurrentNationId=id; loadProfileEditor('nations',id);
            } else if (mode==='religions') {
                const id=db.ref('notes/religions').push().key;
                notesData.religions[id]={name,content:''};
                await db.ref('notes/religions/'+id).set({name,content:''});
                notesCurrentReligionId=id; loadProfileEditor('religions',id);
            } else if (mode==='worldbuilding') {
                const id=db.ref('notes/worldbuilding').push().key;
                notesData.worldbuilding[id]={name,content:''};
                await db.ref('notes/worldbuilding/'+id).set({name,content:''});
                notesCurrentWbId=id; loadProfileEditor('worldbuilding',id);
            }
            renderNotesNav();
        }

        function openAddPotentialScenesCharacter() {
            notesAddMode='potentialScenes'; _pendingPsCharAdd=true;
            document.getElementById('modal-add-item-title').textContent='Add Character';
            document.getElementById('new-item-name').value='';
            document.getElementById('add-item-error').textContent='';
            openModal('modal-add-item');
        }

        async function _doAddPsCharacter() {
            const name=document.getElementById('new-item-name').value.trim();
            if (!name) { document.getElementById('add-item-error').textContent='Name required.'; return; }
            const id=db.ref('notes/potentialScenes').push().key;
            notesData.potentialScenes[id]={name,chapters:{}};
            await db.ref('notes/potentialScenes/'+id).set({name,chapters:{}});
            closeModal('modal-add-item'); _pendingPsCharAdd=false;
            notesCurrentPsCharId=id; notesCurrentChId=null;
            showPotentialChaptersList(); renderNotesNav();
        }

        function loadProfileEditor(cat, id) {
            const data=notesData[cat]?.[id]; if (!data) return;
            hideAllNotesViews();
            document.getElementById('notes-editor-content').style.display='flex';
            document.getElementById('notes-editor-title').value=data.name||'';
            document.getElementById('notes-editor-body').innerHTML=data.content||'';
            document.getElementById('notes-save-status').textContent='Saved';
            notesUnsavedFlag=false;
        }

        function loadOverallStoryEditor() {
            hideAllNotesViews();
            document.getElementById('notes-editor-content').style.display='flex';
            document.getElementById('notes-editor-title').value='Overall Story';
            document.getElementById('notes-editor-title').readOnly=true;
            document.getElementById('notes-editor-body').innerHTML=notesData.overallStory.content||'';
            document.getElementById('notes-save-status').textContent='Saved';
            notesUnsavedFlag=false;
        }

        function selectPotentialScenesCharacter(psId) {
            notesCurrentPsCharId=psId; notesCurrentChId=null; notesUnsavedFlag=false;
            showPotentialChaptersList(); renderNotesNav();
        }

        function showPotentialChaptersList() {
            if (!notesCurrentPsCharId) return;
            hideAllNotesViews();
            const d=notesData.potentialScenes[notesCurrentPsCharId]; if (!d) return;
            document.getElementById('notes-pc-list').style.display='flex';
            document.getElementById('notes-pc-list-title').textContent=(d.name||'Character')+' — Chapters';
            const chs=d.chapters||{};
            const sorted=Object.entries(chs).sort((a,b)=>(a[1].serial||0)-(b[1].serial||0));
            document.getElementById('notes-pc-list-content').innerHTML=sorted.length
                ?`<div style="display:flex;flex-direction:column;gap:0.5rem;">${sorted.map(([cid,cd])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:0.7rem 1rem;border:1px solid var(--rule);cursor:pointer;flex-wrap:wrap;gap:0.4rem;" data-pcid="${cid}"><span style="font-family:var(--serif);font-size:1rem;color:var(--ink);">${cd.serial||''}. ${escHtml(cd.title||'Untitled')}</span><span style="display:flex;gap:0.3rem;"><button class="icon-btn pc-edit-btn" data-pcid="${cid}">✎</button><button class="icon-btn danger pc-del-btn" data-pcid="${cid}">✕</button></span></div>`).join('')}</div>`
                :`<p style="color:var(--muted);font-style:italic;text-align:center;padding:2rem;">No potential chapters yet. Click "+ Add Chapter" to create one.</p>`;
        }

        function openPotentialChapterEditor(psId, chId) {
            notesCurrentPsCharId=psId; notesCurrentChId=chId; notesUnsavedFlag=false;
            const cd=notesData.potentialScenes[psId]?.chapters?.[chId]; if (!cd) return;
            hideAllNotesViews();
            document.getElementById('notes-editor-content').style.display='flex';
            document.getElementById('notes-editor-title').value=cd.title||'';
            document.getElementById('notes-editor-body').innerHTML=cd.content||'';
            document.getElementById('notes-save-status').textContent='Saved';
        }

        function openAddPotentialChapter() {
            if (!notesCurrentPsCharId) return;
            const d=notesData.potentialScenes[notesCurrentPsCharId];
            document.getElementById('new-pc-title').value='';
            document.getElementById('new-pc-serial').value=(d&&d.chapters?Object.keys(d.chapters).length:0)+1;
            document.getElementById('add-pc-error').textContent='';
            openModal('modal-add-potential-chapter');
        }

        async function addPotentialChapter() {
            if (!notesCurrentPsCharId) return;
            const title=document.getElementById('new-pc-title').value.trim();
            const serial=parseInt(document.getElementById('new-pc-serial').value)||1;
            if (!title) { document.getElementById('add-pc-error').textContent='Title required.'; return; }
            const chId=db.ref('notes/potentialScenes/'+notesCurrentPsCharId+'/chapters').push().key;
            if (!notesData.potentialScenes[notesCurrentPsCharId].chapters) notesData.potentialScenes[notesCurrentPsCharId].chapters={};
            notesData.potentialScenes[notesCurrentPsCharId].chapters[chId]={title,serial,content:''};
            await db.ref('notes/potentialScenes/'+notesCurrentPsCharId+'/chapters/'+chId).set({title,serial,content:''});
            closeModal('modal-add-potential-chapter');
            notesCurrentChId=chId;
            openPotentialChapterEditor(notesCurrentPsCharId,chId);
            renderNotesNav();
        }

        function openEditPotentialChapter(psId, chId) {
            const cd=notesData.potentialScenes[psId]?.chapters?.[chId]; if (!cd) return;
            document.getElementById('edit-pc-key').value=chId;
            document.getElementById('edit-pc-key').dataset.psId=psId;
            document.getElementById('edit-pc-title').value=cd.title||'';
            document.getElementById('edit-pc-serial').value=cd.serial||1;
            openModal('modal-edit-potential-chapter');
        }

        async function savePotentialChapterMeta() {
            const chId=document.getElementById('edit-pc-key').value;
            const psId=document.getElementById('edit-pc-key').dataset.psId;
            const title=document.getElementById('edit-pc-title').value.trim()||'Untitled';
            const serial=parseInt(document.getElementById('edit-pc-serial').value)||1;
            if (!notesData.potentialScenes[psId]?.chapters?.[chId]) return;
            notesData.potentialScenes[psId].chapters[chId].title=title;
            notesData.potentialScenes[psId].chapters[chId].serial=serial;
            await db.ref('notes/potentialScenes/'+psId+'/chapters/'+chId).update({title,serial});
            if (notesCurrentChId===chId) document.getElementById('notes-editor-title').value=title;
            closeModal('modal-edit-potential-chapter');
            showPotentialChaptersList(); renderNotesNav();
        }

        async function deletePotentialChapter(psId, chId) {
            if (!confirm('Delete this potential chapter?')) return;
            delete notesData.potentialScenes[psId].chapters[chId];
            await db.ref('notes/potentialScenes/'+psId+'/chapters/'+chId).remove();
            if (notesCurrentChId===chId) { notesCurrentChId=null; hideAllNotesViews(); showPotentialChaptersList(); }
            else showPotentialChaptersList();
            renderNotesNav();
        }

        async function deletePotentialScenesCharacter(psId) {
            if (!confirm('Delete this character and all their potential chapters?')) return;
            delete notesData.potentialScenes[psId];
            await db.ref('notes/potentialScenes/'+psId).remove();
            if (notesCurrentPsCharId===psId) { notesCurrentPsCharId=null; notesCurrentChId=null; }
            hideAllNotesViews(); selectNotesCategory('potentialScenes'); renderNotesNav();
        }

        async function deleteNotesItem(dataKey, id) {
            if (!confirm('Delete this item?')) return;
            const map={characters:'notes/characters',potentialScenes:'notes/potentialScenes',nations:'notes/nations',religions:'notes/religions',worldbuilding:'notes/worldbuilding'};
            delete notesData[dataKey][id];
            await db.ref(map[dataKey]+'/'+id).remove();
            if (dataKey==='potentialScenes'&&notesCurrentPsCharId===id) { notesCurrentPsCharId=null; notesCurrentChId=null; }
            else if (dataKey==='characters'&&notesCurrentCharId===id) notesCurrentCharId=null;
            else if (dataKey==='nations'&&notesCurrentNationId===id) notesCurrentNationId=null;
            else if (dataKey==='religions'&&notesCurrentReligionId===id) notesCurrentReligionId=null;
            else if (dataKey==='worldbuilding'&&notesCurrentWbId===id) notesCurrentWbId=null;
            hideAllNotesViews(); selectNotesCategory(notesCurrentCategory); renderNotesNav();
        }

        // ── Timeline ──
        function loadTimelineView() {
            hideAllNotesViews();
            document.getElementById('notes-timeline-view').style.display='flex';
            document.getElementById('timeline-era-positive').value=notesData.timeline.positiveSuffix||'AD';
            document.getElementById('timeline-era-negative').value=notesData.timeline.negativeSuffix||'BC';
            renderTimelineEntries(); timelineUnsavedFlag=false;
            document.getElementById('timeline-save-status').textContent='';
        }
        function formatTimelineYear(y) {
            const p=notesData.timeline.positiveSuffix||'AD', n=notesData.timeline.negativeSuffix||'BC';
            return y>=0?y+' '+p:Math.abs(y)+' '+n;
        }
        function renderTimelineEntries() {
            const c=document.getElementById('timeline-entries');
            const e=(notesData.timeline.entries||[]).slice().sort((a,b)=>(a.year||0)-(b.year||0));
            c.innerHTML=e.map((en,i)=>`<div class="timeline-entry"><span class="timeline-entry-year">${formatTimelineYear(en.year||0)}</span><input type="text" class="timeline-entry-text" value="${escHtml(en.text||'')}" data-tidx="${i}" /><span class="timeline-entry-actions"><button class="icon-btn danger tl-del-btn" data-tidx="${i}">✕</button></span></div>`).join('');
        }
        function addTimelineEntry() {
            const y=parseInt(document.getElementById('timeline-new-year').value);
            const t=document.getElementById('timeline-new-text').value.trim();
            if (isNaN(y)||!t) return;
            notesData.timeline.entries.push({year:y,text:t});
            document.getElementById('timeline-new-year').value='';
            document.getElementById('timeline-new-text').value='';
            timelineUnsavedFlag=true; document.getElementById('timeline-save-status').textContent='Unsaved changes';
            renderTimelineEntries();
        }
        function updateTimelineEntry(idx, txt) {
            const sorted=notesData.timeline.entries.slice().sort((a,b)=>(a.year||0)-(b.year||0));
            const entry=sorted[idx]; const orig=notesData.timeline.entries.indexOf(entry);
            if (orig>=0) notesData.timeline.entries[orig].text=txt;
            timelineUnsavedFlag=true; document.getElementById('timeline-save-status').textContent='Unsaved changes';
        }
        function deleteTimelineEntry(idx) {
            const sorted=notesData.timeline.entries.slice().sort((a,b)=>(a.year||0)-(b.year||0));
            const entry=sorted[idx]; const orig=notesData.timeline.entries.indexOf(entry);
            if (orig>=0) notesData.timeline.entries.splice(orig,1);
            timelineUnsavedFlag=true; document.getElementById('timeline-save-status').textContent='Unsaved changes';
            renderTimelineEntries();
        }
        async function saveTimelineSettings() {
            const p=document.getElementById('timeline-era-positive').value.trim()||'AD';
            const n=document.getElementById('timeline-era-negative').value.trim()||'BC';
            notesData.timeline.positiveSuffix=p; notesData.timeline.negativeSuffix=n;
            await db.ref('notes/timeline/positiveSuffix').set(p);
            await db.ref('notes/timeline/negativeSuffix').set(n);
            renderTimelineEntries(); document.getElementById('timeline-save-status').textContent='Era saved ✓';
        }
        async function saveTimelineEntries() {
            await db.ref('notes/timeline/entries').set(notesData.timeline.entries||[]);
            timelineUnsavedFlag=false; document.getElementById('timeline-save-status').textContent='Timeline saved ✓';
        }
        async function saveTimelineEntriesSilent() {
            await db.ref('notes/timeline/entries').set(notesData.timeline.entries||[]);
            timelineUnsavedFlag=false;
        }

        // ── Save notes ──
        function notesUnsaved() { notesUnsavedFlag=true; document.getElementById('notes-save-status').textContent='Unsaved changes'; }
        async function saveCurrentNote() {
            const title=document.getElementById('notes-editor-title').value.trim()||'Untitled';
            const content=document.getElementById('notes-editor-body').innerHTML;
            if (notesCurrentCategory==='characters'&&notesCurrentCharId) {
                notesData.characters[notesCurrentCharId]={name:title,content};
                await db.ref('notes/characters/'+notesCurrentCharId).set({name:title,content});
            } else if (notesCurrentCategory==='potentialScenes'&&notesCurrentPsCharId&&notesCurrentChId) {
                if (notesData.potentialScenes[notesCurrentPsCharId]?.chapters?.[notesCurrentChId]) {
                    notesData.potentialScenes[notesCurrentPsCharId].chapters[notesCurrentChId].title=title;
                    notesData.potentialScenes[notesCurrentPsCharId].chapters[notesCurrentChId].content=content;
                }
                await db.ref('notes/potentialScenes/'+notesCurrentPsCharId+'/chapters/'+notesCurrentChId).update({title,content});
            } else if (notesCurrentCategory==='nations'&&notesCurrentNationId) {
                notesData.nations[notesCurrentNationId]={name:title,content};
                await db.ref('notes/nations/'+notesCurrentNationId).set({name:title,content});
            } else if (notesCurrentCategory==='religions'&&notesCurrentReligionId) {
                notesData.religions[notesCurrentReligionId]={name:title,content};
                await db.ref('notes/religions/'+notesCurrentReligionId).set({name:title,content});
            } else if (notesCurrentCategory==='worldbuilding'&&notesCurrentWbId) {
                notesData.worldbuilding[notesCurrentWbId]={name:title,content};
                await db.ref('notes/worldbuilding/'+notesCurrentWbId).set({name:title,content});
            } else if (notesCurrentCategory==='overallStory') {
                notesData.overallStory.content=content;
                await db.ref('notes/overallStory/content').set(content);
            }
            notesUnsavedFlag=false; document.getElementById('notes-save-status').textContent='Saved ✓'; renderNotesNav();
        }
        async function saveCurrentNoteSilent() {
            const title=document.getElementById('notes-editor-title').value.trim()||'Untitled';
            const content=document.getElementById('notes-editor-body').innerHTML;
            if (notesCurrentCategory==='characters'&&notesCurrentCharId) {
                await db.ref('notes/characters/'+notesCurrentCharId).set({name:title,content});
            } else if (notesCurrentCategory==='potentialScenes'&&notesCurrentPsCharId&&notesCurrentChId) {
                await db.ref('notes/potentialScenes/'+notesCurrentPsCharId+'/chapters/'+notesCurrentChId).update({title,content});
            } else if (notesCurrentCategory==='nations'&&notesCurrentNationId) {
                await db.ref('notes/nations/'+notesCurrentNationId).set({name:title,content});
            } else if (notesCurrentCategory==='religions'&&notesCurrentReligionId) {
                await db.ref('notes/religions/'+notesCurrentReligionId).set({name:title,content});
            } else if (notesCurrentCategory==='worldbuilding'&&notesCurrentWbId) {
                await db.ref('notes/worldbuilding/'+notesCurrentWbId).set({name:title,content});
            } else if (notesCurrentCategory==='overallStory') {
                await db.ref('notes/overallStory/content').set(content);
            }
            notesUnsavedFlag=false;
        }

        function notesEditorBack() {
            if (notesCurrentCategory==='potentialScenes'&&notesCurrentChId) {
                if (notesUnsavedFlag) saveCurrentNoteSilent();
                notesCurrentChId=null; showPotentialChaptersList();
            } else if (notesCurrentCategory==='potentialScenes'&&notesCurrentPsCharId) {
                if (notesUnsavedFlag) saveCurrentNoteSilent();
                notesCurrentPsCharId=null; selectNotesCategory('potentialScenes');
            } else if (notesCurrentCharId) { notesCurrentCharId=null; selectNotesCategory(notesCurrentCategory); }
            else if (notesCurrentNationId) { notesCurrentNationId=null; selectNotesCategory('nations'); }
            else if (notesCurrentReligionId) { notesCurrentReligionId=null; selectNotesCategory('religions'); }
            else if (notesCurrentWbId) { notesCurrentWbId=null; selectNotesCategory('worldbuilding'); }
            else selectNotesCategory(notesCurrentCategory);
        }
        function notesPcListBack() {
            if (notesUnsavedFlag) saveCurrentNoteSilent();
            notesCurrentPsCharId=null; notesCurrentChId=null; selectNotesCategory('potentialScenes');
        }
        function notesTimelineBack() {
            if (timelineUnsavedFlag) saveTimelineEntriesSilent();
            selectNotesCategory('timeline');
        }
        function notesBrowserBack() { if (notesCurrentCategory) selectNotesCategory(notesCurrentCategory); }

        // ===== EVENT DELEGATION =====
        function init() {
            // Sidebar category clicks
            document.getElementById('notes-nav-list').addEventListener('click', function(e) {
                const cat = e.target.closest('.notes-nav-category');
                if (cat && cat.dataset.cat) { selectNotesCategory(cat.dataset.cat); return; }
                const psChar = e.target.closest('.ps-char-name');
                if (psChar && psChar.dataset.psid) { selectPotentialScenesCharacter(psChar.dataset.psid); return; }
                const psDel = e.target.closest('.ps-del-btn');
                if (psDel && psDel.dataset.psid) { e.stopPropagation(); deletePotentialScenesCharacter(psDel.dataset.psid); return; }
            });

            // Sidebar add button
            document.getElementById('notes-sidebar-add').addEventListener('click', function() { handleNotesBrowserAdd(); });

            // Browser card clicks & delete
            document.getElementById('notes-browser-content').addEventListener('click', function(e) {
                const card = e.target.closest('.notes-card');
                if (card) { openNotesItem(card.dataset.key, card.dataset.id); return; }
                const del = e.target.closest('.card-del-btn');
                if (del) { e.stopPropagation(); deleteNotesItem(del.dataset.key, del.dataset.id); return; }
            });
            document.getElementById('notes-browser-add-btn').addEventListener('click', function() { handleNotesBrowserAdd(); });
            document.getElementById('notes-browser-back-btn').addEventListener('click', function() { notesBrowserBack(); });

            // Editor
            document.getElementById('notes-editor-back-btn').addEventListener('click', function() { notesEditorBack(); });
            document.getElementById('notes-save-btn').addEventListener('click', function() { saveCurrentNote(); });
            document.getElementById('notes-editor-body').addEventListener('input', function() { notesUnsaved(); });
            document.getElementById('notes-editor-body').addEventListener('keydown', function(e) {
                if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); saveCurrentNote(); }
            });
            document.getElementById('notes-tb-bold').addEventListener('mousedown', function(e) { e.preventDefault(); document.execCommand('bold',false,null); });
            document.getElementById('notes-tb-italic').addEventListener('mousedown', function(e) { e.preventDefault(); document.execCommand('italic',false,null); });
            document.getElementById('notes-tb-underline').addEventListener('mousedown', function(e) { e.preventDefault(); document.execCommand('underline',false,null); });

            // PC list
            document.getElementById('notes-pc-list-content').addEventListener('click', function(e) {
                const row = e.target.closest('[data-pcid]');
                if (row) { openPotentialChapterEditor(notesCurrentPsCharId, row.dataset.pcid); return; }
                const edit = e.target.closest('.pc-edit-btn');
                if (edit) { e.stopPropagation(); openEditPotentialChapter(notesCurrentPsCharId, edit.dataset.pcid); return; }
                const del = e.target.closest('.pc-del-btn');
                if (del) { e.stopPropagation(); deletePotentialChapter(notesCurrentPsCharId, del.dataset.pcid); return; }
            });
            document.getElementById('notes-pc-add-btn').addEventListener('click', function() { openAddPotentialChapter(); });
            document.getElementById('notes-pc-back-btn').addEventListener('click', function() { notesPcListBack(); });

            // Timeline
            document.getElementById('timeline-entry-add-btn').addEventListener('click', function() { addTimelineEntry(); });
            document.getElementById('timeline-era-save-btn').addEventListener('click', function() { saveTimelineSettings(); });
            document.getElementById('timeline-entries-save-btn').addEventListener('click', function() { saveTimelineEntries(); });
            document.getElementById('timeline-back-btn').addEventListener('click', function() { notesTimelineBack(); });
            document.getElementById('timeline-entries').addEventListener('click', function(e) {
                const del = e.target.closest('.tl-del-btn');
                if (del) { deleteTimelineEntry(parseInt(del.dataset.tidx)); return; }
            });
            document.getElementById('timeline-entries').addEventListener('change', function(e) {
                const inp = e.target.closest('.timeline-entry-text');
                if (inp && inp.dataset.tidx!==undefined) { updateTimelineEntry(parseInt(inp.dataset.tidx), inp.value); }
            });
            document.getElementById('timeline-era-positive').addEventListener('change', function() { timelineUnsavedFlag=true; document.getElementById('timeline-save-status').textContent='Unsaved changes'; });
            document.getElementById('timeline-era-negative').addEventListener('change', function() { timelineUnsavedFlag=true; document.getElementById('timeline-save-status').textContent='Unsaved changes'; });

            // Modals
            document.getElementById('modal-add-item-btn').addEventListener('click', function() {
                if (_pendingPsCharAdd) _doAddPsCharacter(); else addNotesItem();
            });
            document.getElementById('modal-add-item-cancel').addEventListener('click', function() { closeModal('modal-add-item'); });
            document.getElementById('modal-add-pc-btn').addEventListener('click', function() { addPotentialChapter(); });
            document.getElementById('modal-add-pc-cancel').addEventListener('click', function() { closeModal('modal-add-potential-chapter'); });
            document.getElementById('modal-edit-pc-save-btn').addEventListener('click', function() { savePotentialChapterMeta(); });
            document.getElementById('modal-edit-pc-cancel').addEventListener('click', function() { closeModal('modal-edit-potential-chapter'); });
            document.querySelectorAll('.modal-overlay').forEach(el => {
                el.addEventListener('click', function(e) { if (e.target===el) closeModal(el.id); });
            });

            // Global Ctrl+S
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey||e.metaKey)&&e.key==='s') {
                    e.preventDefault();
                    if (notesCurrentCategory==='timeline') saveTimelineEntries();
                    else if (notesUnsavedFlag) saveCurrentNote();
                }
            });

            // Load data
            document.getElementById('notes-empty').querySelector('p').textContent='Loading notes…';
            db.ref('notes').once('value').then(snap => {
                if (snap.exists()) {
                    const raw=snap.val();
                    notesData.characters=raw.characters||{};
                    notesData.potentialScenes=raw.potentialScenes||{};
                    notesData.nations=raw.nations||{};
                    notesData.religions=raw.religions||{};
                    notesData.worldbuilding=raw.worldbuilding||{};
                    notesData.overallStory=raw.overallStory||{content:''};
                    notesData.timeline=raw.timeline||{positiveSuffix:'AD',negativeSuffix:'BC',entries:[]};
                }
                selectNotesCategory('potentialScenes');
                renderNotesNav();
            });
            db.ref('notes').on('value', snap => {
                if (snap.exists()) {
                    const raw=snap.val();
                    notesData.characters=raw.characters||{};
                    notesData.potentialScenes=raw.potentialScenes||{};
                    notesData.nations=raw.nations||{};
                    notesData.religions=raw.religions||{};
                    notesData.worldbuilding=raw.worldbuilding||{};
                    notesData.overallStory=raw.overallStory||{content:''};
                    notesData.timeline=raw.timeline||{positiveSuffix:'AD',negativeSuffix:'BC',entries:[]};
                }
                renderNotesNav();
            });
        }

        // Start when DOM is ready
        if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
