<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Tapestry – Notes</title>
    <style>
        /* ── Minimal reset & notes-only styles ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #f7f4ee; color: #1a1714; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem; border-bottom: 1px solid #ddd5c8; background: #f7f4ee; }
        .app-header h1 { font-family: Georgia, serif; font-weight: 300; font-size: 1.4rem; }
        .btn-sm { padding: 0.4rem 0.8rem; border: 1px solid #ddd5c8; background: transparent; color: #8c7f70; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; }
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .notes-sidebar { width: 240px; border-right: 1px solid #ddd5c8; background: #f3efe8; overflow-y: auto; flex-shrink: 0; }
        .notes-sidebar-header { padding: 1rem 1.2rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: #8c7f70; border-bottom: 1px solid #ddd5c8; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-add-btn { background: none; border: none; font-size: 1.2rem; color: #5c3d2e; cursor: pointer; }
        .notes-nav-list { list-style: none; padding: 0.3rem 0; }
        .notes-nav-category { padding: 0.55rem 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; border-left: 3px solid transparent; transition: background 0.15s; -webkit-tap-highlight-color: transparent; user-select: none; }
        .notes-nav-category.active { border-left-color: #5c3d2e; background: rgba(92,61,46,0.08); font-weight: 500; }
        .notes-nav-category:hover { background: rgba(92,61,46,0.06); }
        .notes-editor-area { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .empty-state { text-align: center; color: #8c7f70; margin-top: 3rem; }
        .notes-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; }
        .notes-card { border: 1px solid #ddd5c8; padding: 1rem; cursor: pointer; background: #fff; display: flex; justify-content: space-between; align-items: center; }
        .notes-card:hover { border-color: #5c3d2e; }
        .btn-accent { padding: 0.5rem 1rem; background: #5c3d2e; color: #fff; border: none; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; }
        .btn-back { background: none; border: 1px solid #ddd5c8; padding: 0.35rem 0.8rem; cursor: pointer; color: #8c7f70; font-size: 0.72rem; text-transform: uppercase; }
        @media (max-width: 640px) {
            .app-body { flex-direction: column; }
            .notes-sidebar { width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 2px solid #ddd5c8; }
            .notes-nav-list { display: flex; flex-wrap: wrap; }
            .notes-nav-category { border-left: none; border-bottom: 2px solid transparent; padding: 0.5rem 0.8rem; font-size: 0.7rem; }
            .notes-nav-category.active { border-bottom-color: #5c3d2e; border-left-color: transparent; }
        }
    </style>
</head>
<body>
    <div style="display:flex; flex-direction:column; height:100%;">
        <div class="app-header">
            <h1>Notes</h1>
            <a href="editor.html" class="btn-sm">← Back to Editor</a>
        </div>
        <div class="app-body">
            <div class="notes-sidebar">
                <div class="notes-sidebar-header">
                    Categories
                    <button class="sidebar-add-btn" onclick="handleNotesAdd()">＋</button>
                </div>
                <ul class="notes-nav-list" id="notes-nav-list"></ul>
            </div>
            <div class="notes-editor-area" id="notes-editor-area">
                <div class="empty-state" id="notes-empty"><p>Loading notes…</p></div>
                <div id="notes-browser" style="display:none;">
                    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;">
                        <button class="btn-back" onclick="notesBrowserBack()">← Back</button>
                        <h3 id="notes-browser-title" style="font-family:Georgia,serif; font-weight:300;">Items</h3>
                        <button class="btn-accent" onclick="handleNotesBrowserAdd()" style="margin-left:auto;">＋ Add</button>
                    </div>
                    <div id="notes-browser-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        // Firebase init
        firebase.initializeApp({
            apiKey: "AIzaSyAwktvktXaaRxFPX500kOBcvuUtOjRjz6M",
            authDomain: "wakanda-shit.firebaseapp.com",
            databaseURL: "https://wakanda-shit-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wakanda-shit",
            storageBucket: "wakanda-shit.firebasestorage.app",
            messagingSenderId: "491323769717",
            appId: "1:491323769717:web:825b6044e43e672404493c"
        });
        const db = firebase.database();

        // State
        let notesData = { potentialScenes:{}, characters:{}, nations:{}, religions:{}, worldbuilding:{} };
        let currentCategory = null;
        let addMode = null;

        function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function renderNav() {
            const nav = document.getElementById('notes-nav-list');
            if (!nav) return;
            nav.innerHTML = '';
            const categories = [
                { key:'potentialScenes', label:'🎬 Potential Scenes', count:Object.keys(notesData.potentialScenes).length },
                { key:'characters', label:'👤 Characters', count:Object.keys(notesData.characters).length },
                { key:'nations', label:'🏴 Nations', count:Object.keys(notesData.nations).length },
                { key:'religions', label:'☀️ Religions', count:Object.keys(notesData.religions).length },
                { key:'worldbuilding', label:'📜 Worldbuilding', count:Object.keys(notesData.worldbuilding).length }
            ];
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = 'notes-nav-category' + (currentCategory === cat.key ? ' active' : '');
                li.innerHTML = `<span>${cat.label}</span> <span style="margin-left:auto;font-size:0.7rem;opacity:0.6;">${cat.count}</span>`;
                li.onclick = function() { selectCategory(cat.key); };
                nav.appendChild(li);
            });
        }

        function selectCategory(cat) {
            currentCategory = cat;
            document.getElementById('notes-empty').style.display = 'none';
            document.getElementById('notes-browser').style.display = 'block';
            document.getElementById('notes-browser-title').textContent = cat.charAt(0).toUpperCase()+cat.slice(1);
            addMode = cat;
            renderCards(notesData[cat] || {});
            renderNav();
        }

        function renderCards(dataObj) {
            const container = document.getElementById('notes-browser-content');
            const entries = Object.entries(dataObj);
            if (!entries.length) {
                container.innerHTML = '<p style="color:#8c7f70; text-align:center; padding:2rem;">No items yet. Click "+ Add" to create one.</p>';
                return;
            }
            container.innerHTML = `<div class="notes-card-grid">${entries.map(([id, d]) => `
                <div class="notes-card" onclick="openItem('${addMode}','${id}')">
                    <span>${escHtml(d.name || 'Unnamed')}</span>
                    <button class="btn-sm" style="font-size:0.7rem;" onclick="event.stopPropagation();deleteItem('${addMode}','${id}')">✕</button>
                </div>`).join('')}</div>`;
        }

        function handleNotesAdd() { handleNotesBrowserAdd(); }
        function handleNotesBrowserAdd() {
            const name = prompt('Enter name:');
            if (!name) return;
            const id = db.ref('notes/' + addMode).push().key;
            notesData[addMode][id] = { name, content: '' };
            db.ref('notes/' + addMode + '/' + id).set({ name, content: '' });
            renderCards(notesData[addMode]);
            renderNav();
        }

        function openItem(mode, id) {
            const item = notesData[mode][id];
            if (!item) return;
            alert('Name: ' + item.name + '\nContent: ' + (item.content || 'empty'));
        }

        async function deleteItem(mode, id) {
            if (!confirm('Delete?')) return;
            delete notesData[mode][id];
            await db.ref('notes/' + mode + '/' + id).remove();
            renderCards(notesData[mode]);
            renderNav();
        }

        function notesBrowserBack() {
            document.getElementById('notes-browser').style.display = 'none';
            document.getElementById('notes-empty').style.display = 'block';
            currentCategory = null;
            renderNav();
        }

        // Load data
        (async function() {
            const snap = await db.ref('notes').once('value');
            if (snap.exists()) {
                const d = snap.val();
                notesData.potentialScenes = d.potentialScenes || {};
                notesData.characters = d.characters || {};
                notesData.nations = d.nations || {};
                notesData.religions = d.religions || {};
                notesData.worldbuilding = d.worldbuilding || {};
            }
            renderNav();
            db.ref('notes').on('value', snap => {
                if (snap.exists()) {
                    const d = snap.val();
                    notesData.potentialScenes = d.potentialScenes || {};
                    notesData.characters = d.characters || {};
                    notesData.nations = d.nations || {};
                    notesData.religions = d.religions || {};
                    notesData.worldbuilding = d.worldbuilding || {};
                }
                renderNav();
            });
        })();
    </script>
</body>
</html>
